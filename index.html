<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Conway's Game of Life — Autómata celular interactivo por InfPostSCESI" />
  <title>Game of Life · InfPostSCESI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <span class="logo">🧬 Game of Life</span>
    <div class="stats">
      <span>Gen <strong id="gen">0</strong></span>
      <span>Pop <strong id="pop">0</strong></span>
    </div>
  </header>

  <main>
    <canvas id="canvas"></canvas>
  </main>

  <footer class="controls">
    <button id="btn-play"   class="btn accent" title="Play / Pause (Espacio)">▶</button>
    <button id="btn-step"   class="btn"         title="Paso (S)">⏭</button>
    <button id="btn-random" class="btn"         title="Aleatorio (R)">⚄</button>
    <button id="btn-clear"  class="btn"         title="Limpiar (C)">✕</button>

    <select id="pattern-select" class="btn pattern-select" title="Patrones predefinidos">
      <option value="">Patrón…</option>
      <option value="glider">🛸 Glider</option>
      <option value="blinker">💡 Blinker</option>
      <option value="pulsar">🌟 Pulsar</option>
      <option value="rpentomino">🔮 R-Pentomino</option>
      <option value="lwss">🚀 LWSS</option>
      <option value="diehard">💀 Diehard</option>
    </select>

    <div class="speed-wrap">
      <label for="speed">Speed</label>
      <input type="range" id="speed" min="1" max="30" value="10" />
    </div>

    <button id="btn-mute" class="btn" title="Silenciar (M)">🔊</button>

    <div class="kbd-hint" title="Atajos de teclado">
      <span>⎵</span><span>S</span><span>R</span><span>C</span><span>M</span>
    </div>
  </footer>

  <script src="sound.js"></script>
  <script src="engine.js"></script>
  <script src="renderer.js"></script>
  <script src="controls.js"></script>
  <script src="app.js"></script>
</body>
</html>
